env:
  demo_database:
  - name: DB_NAME
    value: demo_db
  - name: ENVIRONMENT
    value: dev
  - name: MAX_CONNECTIONS
    value: '100'
image:
  imageName: asia-south1-docker.pkg.dev/cloudlearnhub-gke-1546/demo-database/database:1-dev
  pullPolicy: IfNotPresent
  repository: asia-south1-docker.pkg.dev/cloudlearnhub-gke-1546/demo-database/database
  tag: 1-dev
replicaCount: 1
resources:
  limits:
    cpu: 100m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
service:
  port: 8080
  type: ClusterIP
serviceName: demo-database
